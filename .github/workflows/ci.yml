name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Tests unitaires (extraction, chargement)
        run: PYTHONPATH=. pytest -v

      - name: Pipeline complet (échantillon réel commité)
        run: bash scripts/run_pipeline_local.sh
